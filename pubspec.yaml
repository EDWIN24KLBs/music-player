name: music_player
description: "A modern music player app with YouTube Music-inspired UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  
  # Audio playback
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.12
  
  # State management
  provider: ^6.1.2
  
  # Permissions
  permission_handler: ^11.3.1
  
  # File system
  path_provider: ^2.1.3
  on_audio_query: ^2.9.0
  
  # UI enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  audio_video_progress_bar: ^2.0.3
  
  # Local storage for playlists
  shared_preferences: ^2.2.3
  
  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets folder for future use
  assets:
    - assets/images/
    
  # Custom fonts can be added here later
